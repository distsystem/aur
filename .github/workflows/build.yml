name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Comma-separated package names (empty = all packages)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      empty: ${{ steps.set.outputs.empty }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute changed packages
        id: set
        env:
          INPUT_PKGS: ${{ inputs.packages }}
          EVENT: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_AFTER_SHA: ${{ github.event.after }}
        run: |
          set -euo pipefail

          all_pkgs() {
            find . -maxdepth 2 -name PKGBUILD -printf '%h\n' \
              | sed 's|^\./||' | sort -u
          }

          diff_pkgs() {
            git diff --name-only "$1" "$2" \
              | awk -F/ 'NF>1 {print $1}' | sort -u \
              | while read -r d; do [[ -f "$d/PKGBUILD" ]] && echo "$d"; done
          }

          if [[ -n "${INPUT_PKGS:-}" ]]; then
            mapfile -t pkgs < <(tr ',' '\n' <<<"$INPUT_PKGS" | sed '/^$/d')
          elif [[ "$EVENT" == "pull_request" ]]; then
            mapfile -t pkgs < <(diff_pkgs "$PR_BASE_SHA" "$PR_HEAD_SHA")
          elif [[ "$EVENT" == "push" ]]; then
            base="$PUSH_BEFORE_SHA"
            [[ "$base" =~ ^0+$ ]] && base="${PUSH_AFTER_SHA}^"
            mapfile -t pkgs < <(diff_pkgs "$base" "$PUSH_AFTER_SHA")
          else
            mapfile -t pkgs < <(all_pkgs)
          fi

          printf 'detected packages:\n'
          printf '  - %s\n' "${pkgs[@]:-<none>}"

          if (( ${#pkgs[@]} == 0 )); then
            echo 'empty=true' >> "$GITHUB_OUTPUT"
            echo 'matrix={"pkg":[]}' >> "$GITHUB_OUTPUT"
          else
            echo 'empty=false' >> "$GITHUB_OUTPUT"
            json=$(printf '%s\n' "${pkgs[@]}" | jq -R . | jq -sc '{pkg: .}')
            echo "matrix=$json" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: detect
    if: needs.detect.outputs.empty != 'true'
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}
    steps:
      - name: Install build deps
        run: |
          pacman -Syu --noconfirm --needed git sudo

      - name: Create builder user
        run: |
          useradd -m builder
          printf 'builder ALL=(ALL) NOPASSWD: ALL\n' > /etc/sudoers.d/builder

      - uses: actions/checkout@v4

      - name: Prepare workspace
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          chown -R builder: "$GITHUB_WORKSPACE"

      - name: makepkg ${{ matrix.pkg }}
        env:
          PKG: ${{ matrix.pkg }}
        run: |
          sudo -u builder bash -c '
            set -euo pipefail
            cd "'"$GITHUB_WORKSPACE/$PKG"'"
            makepkg --noconfirm --syncdeps --noprogressbar --skippgpcheck
          '

  push-aur:
    needs: [detect, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect.outputs.empty != 'true'
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}
    steps:
      - name: Install deps
        run: |
          pacman -Syu --noconfirm --needed git openssh

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # lib/aur-push.sh reads `git log -1 -- $pkg/`

      - name: Mark workspace safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup SSH for AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" > ~/.ssh/id_aur
          chmod 600 ~/.ssh/id_aur
          ssh-keyscan -t rsa,ed25519 aur.archlinux.org > ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
              User aur
              IdentityFile ~/.ssh/id_aur
              IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Configure git author
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Push ${{ matrix.pkg }} to AUR
        run: lib/aur-push.sh ${{ matrix.pkg }}
