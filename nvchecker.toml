[__config__]
oldver = "oldver.json"
newver = "newver.json"

[worklink]
source = "cmd"
cmd = """
curl -fsSL 'https://www.cm-worklink.com/lappst/hostplatform/downloadKey?build=0&versionChannel=07&downloadKey=GTLc&url=https://www.cm-worklink.com/' \
| jq -r '"\\(.data.version.versionNo)-\\(.data.version.build)-" + (.data.version.resourceUrl | capture("-(?<c>[0-9a-f]+)_linux").c)'
"""

[nix-installer-bin]
source = "github"
github = "DeterminateSystems/nix-installer"
use_latest_release = true
prefix = "v"

[kimi-webbridge-bin]
source = "cmd"
cmd = """
tmp=$(mktemp) && \
curl -fsSL https://kimi-web-img.moonshot.cn/webbridge/latest/releases/kimi-webbridge-linux-amd64 -o "$tmp" && \
chmod +x "$tmp" && \
"$tmp" upgrade | awk 'NR==1{sub(/^v/,"",$2); print $2; exit}' ; \
rm -f "$tmp"
"""

