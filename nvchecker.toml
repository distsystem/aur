[__config__]
oldver = "oldver.json"
newver = "newver.json"

[worklink]
source = "cmd"
cmd = """
curl -fsSL 'https://www.cm-worklink.com/lappst/hostplatform/downloadKey?build=0&versionChannel=07&downloadKey=GTLc&url=https://www.cm-worklink.com/' \
| jq -r '"\\(.data.version.versionNo)-\\(.data.version.build)-" + (.data.version.resourceUrl | capture("-(?<c>[0-9a-f]+)_linux").c)'
"""

[nix-installer-bin]
source = "github"
github = "DeterminateSystems/nix-installer"
use_latest_release = true
prefix = "v"

[linux-cachyos-px13]
source = "cmd"
cmd = """
gh api 'repos/CachyOS/linux-cachyos/contents/linux-cachyos/PKGBUILD?ref=master' --jq '.content' | base64 -d | awk '
  /^_major=/  {gsub(/.*=/,"",$0); major=$0}
  /^_minor=/  {gsub(/.*=/,"",$0); minor=$0}
  /^_tagrel=/ {gsub(/.*=/,"",$0); tagrel=$0}
  END { print major "." minor "-" tagrel }
'
"""
