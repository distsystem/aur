PACKAGE_NAME="px13-audio"
PACKAGE_VERSION="@PKGVER@"

MAKE[0]="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"

AUTOINSTALL="yes"

# /lib/modules/$KVER/updates/ wins over /lib/modules/$KVER/kernel/ in modules.dep,
# which is how we override the in-tree versions without touching kernel-headers.

BUILT_MODULE_NAME[0]="snd-soc-tas2783-sdw"
BUILT_MODULE_LOCATION[0]="sound/soc/codecs"
DEST_MODULE_LOCATION[0]="/updates"

BUILT_MODULE_NAME[1]="snd-soc-rt721-sdca"
BUILT_MODULE_LOCATION[1]="sound/soc/codecs"
DEST_MODULE_LOCATION[1]="/updates"

BUILT_MODULE_NAME[2]="soundwire-amd"
BUILT_MODULE_LOCATION[2]="drivers/soundwire"
DEST_MODULE_LOCATION[2]="/updates"

BUILT_MODULE_NAME[3]="snd-soc-sdw-utils"
BUILT_MODULE_LOCATION[3]="sound/soc/sdw_utils"
DEST_MODULE_LOCATION[3]="/updates"
