# UCM override for ASUS ProArt PX13 (HN7306EA/HN7306EAC) on AMD ACP70.
#
# Installed as a conf.d LongName-specific override (confd1 in
# alsa-ucm-conf's ucm.conf), beating the driver-default
# conf.d/amd-soundwire/amd-soundwire.conf trampoline for our card only.
#
# alsa-ucm-conf does not yet ship tas2783 support. We replay the
# upstream sof-soundwire master config, then add the missing tas2783
# branch to the speaker-init flow. No patching of alsa-ucm-conf files.

Syntax 7

<sof-soundwire/sof-soundwire.conf>

If.spk_init_tas2783 {
	Condition {
		Type RegexMatch
		Regex "(tas2783(-1)?)"
		String "${var:SpeakerCodec1}"
	}
	True.Include.spk_init_tas2783.File "/codecs/${var:SpeakerCodec1}/init.conf"
}
